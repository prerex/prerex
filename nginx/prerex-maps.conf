# Prerex — Bot detection maps
# MUST be included at the http {} level (outside any server {} block).
#
# Usage in nginx.conf:
#   http {
#       include /path/to/prerex-maps.conf;
#       ...
#       server { ... }
#   }
#
# Bot list kept in sync with packages/prerex-core/src/bot-patterns.ts

map $http_user_agent $is_prerex_bot {
    default                 0;
    ~*anthropic-ai          1;
    ~*applebot              1;
    ~*baiduspider           1;
    ~*bingbot               1;
    ~*chrome-lighthouse     1;
    ~*claudebot             1;
    ~*duckduckbot           1;
    ~*embedly               1;
    ~*facebookexternalhit   1;
    ~*facebot               1;
    ~*"google page speed"   1;
    ~*googlebot             1;
    ~*gptbot                1;
    ~*gtmetrix              1;
    ~*ia_archiver           1;
    ~*lighthouse            1;
    ~*linkedinbot           1;
    ~*outbrain              1;
    ~*pagespeed             1;
    ~*perplexitybot         1;
    ~*pinterest             1;
    ~*rogerbot              1;
    ~*showyoubot            1;
    ~*slackbot              1;
    ~*slurp                 1;
    ~*twitterbot            1;
    ~*vkshare               1;
    ~*webpagetest           1;
    ~*yandexbot             1;
}

# Static file extensions that should never be prerendered
map $uri $is_prerex_static {
    default 0;
    ~*\.(js|css|mjs|map|jpg|jpeg|png|gif|webp|svg|avif|ico|woff|woff2|ttf|eot|otf|pdf|zip|gz|mp4|mp3|xml|json|txt)$ 1;
}
