# Prerex — Prerender proxy for server {} block
# Include this inside your server {} block.
#
# Prerequisites:
#   1. prerex-maps.conf included at http {} level
#   2. $prerex_api_key variable set before this include
#
# Usage:
#   server {
#       listen 443 ssl;
#       server_name example.com;
#
#       set $prerex_api_key "YOUR_API_KEY_HERE";
#       include /path/to/prerex-server.conf;
#
#       root /var/www/html;
#
#       location / {
#           try_files $uri $uri/ /index.html;
#       }
#   }
#
# How it works:
#   The location / block below intercepts ALL requests. If the visitor is a
#   known bot AND the URI is not a static file, the request is proxied to the
#   Prerex render API. On any error (timeout, 5xx, 429, etc.) the request
#   falls through to your origin so bots still get something.
#
#   Non-bot requests and static files are served normally via try_files.

# ── Main entry point ────────────────────────────────────────────────
location / {
    # Combine bot + static checks into a single flag.
    # Nginx "if" is safe here because we only use return/proxy_pass
    # (no try_files mixing) — see https://www.nginx.com/resources/wiki/start/topics/depth/ifisevil/
    set $prerex_do_render "";
    if ($is_prerex_bot = 1) {
        set $prerex_do_render "Y";
    }
    if ($is_prerex_static = 1) {
        set $prerex_do_render "";
    }

    if ($prerex_do_render = "Y") {
        # 555 is an unused status code we use as a signal to route to @prerex
        return 555;
    }

    try_files $uri $uri/ /index.html;
}

# ── Prerex render proxy (internal) ─────────────────────────────────
error_page 555 = @prerex;

location @prerex {
    internal;
    proxy_pass              https://api.prerex.dev/api/render?url=$scheme://$host$request_uri;
    proxy_set_header        x-api-key       $prerex_api_key;
    proxy_set_header        x-original-ua   $http_user_agent;
    proxy_set_header        x-bot-ip        $remote_addr;
    proxy_ssl_server_name   on;
    proxy_connect_timeout   10s;
    proxy_read_timeout      20s;

    # On upstream error, serve the page normally instead of an error
    proxy_intercept_errors  on;
    error_page 400 401 403 404 429 500 502 503 504 = @fallback;
}

# ── Fallback — serves the page normally when Prerex is unavailable ──
location @fallback {
    internal;
    try_files $uri $uri/ /index.html;
}
